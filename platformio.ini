; Shared settings for every environment
[env]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

upload_port = /dev/cu.usbmodem1101
monitor_port = /dev/cu.usbmodem1101
monitor_speed = 115200
; Auto-save combined_hr_temp lines to data/run_YYYYMMDD_HHMMSS.csv
monitor_filters = default, csv_capture

lib_deps =
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library

; MAX30102 heart-rate sketch — builds only src/max30102_heartrate/
[env:max30102_heartrate]
build_src_filter =u+<max30102_heartrate/>

; MLX90614 temperature sketch — builds only src/mlx90614_temperature/
[env:mlx90614_temperature]
build_src_filter = +<mlx90614_temperature/>

; Shared-bus check — builds only src/i2c_scanner/
[env:i2c_scanner]
build_src_filter = +<i2c_scanner/>

; Combined HR + temperature — builds only src/combined_hr_temp/
[env:combined_hr_temp]
build_src_filter = +<combined_hr_temp/>

; BMI160 6-axis motion — builds only src/bmi160_motion/
[env:bmi160_motion]
build_src_filter = +<bmi160_motion/>

; Combined shared-bus test — MAX30102 heart rate + BMI160 motion
[env:combined_hr_motion]
build_src_filter = +<combined_hr_motion/>

; BMI160 motion logger — ~50 Hz CSV capture for charting (motion_*.csv)
[env:bmi160_motion_log]
build_src_filter = +<bmi160_motion_log/>
monitor_filters = default, motion_csv

; Battery power-check — blinks the onboard LED, no serial dependency
[env:battery_blink]
build_src_filter = +<battery_blink/>

; MAX30102 HR → LittleFS logger; dump over USB with serial command "d"
[env:max30102_hr_log]
build_src_filter = +<max30102_hr_log/>
board_build.filesystem = littlefs
monitor_filters = default, flash_dump

; MAX30102 HR → BLE stream (battery / untethered); Mac: python scripts/ble_hr_stream.py
[env:max30102_hr_ble]
build_src_filter = +<max30102_hr_ble/>

; MAX30102 HR → BLE store-and-forward: logs to LittleFS AND streams; back-fills
; the buffered gap on reconnect. Mac: python scripts/ble_hr_stream.py
[env:max30102_hr_ble_log]
build_src_filter = +<max30102_hr_ble_log/>
board_build.filesystem = littlefs
